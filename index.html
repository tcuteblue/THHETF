<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>存股管家</title>
    
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="存股管家">
    <link rel="apple-touch-icon" href="./icon.png">

    <!-- ========================================== -->
    <!-- 動態 PWA 生成腳本 (Manifest & Service Worker) -->
    <!-- ========================================== -->
    <script>
        (function() {
            // 1. 動態建立絕對路徑 (避免 blob: 解析相對路徑失敗)
            const currentUrl = window.location.href;
            const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1);

            // 2. 動態生成 Manifest
            const manifestObj = {
                "name": "存股管家",
                "short_name": "存股管家",
                "start_url": currentUrl,
                "display": "standalone",
                "background_color": "#f8fafc",
                "theme_color": "#ffffff",
                "icons": [
                    {
                        "src": baseUrl + "icon.png",
                        "sizes": "192x192 512x512",
                        "type": "image/png"
                    },
                    {
                        // 寫死的 SVG 備援圖示，確保 Chrome 觸發安裝條件
                        "src": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgZmlsbD0iIzI1NjNlYiIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjZmZmZmZmIiBmb250LXNpemU9IjE4MCIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtd2VpZ2h0PSJib2xkIj5FVEY8L3RleHQ+PC9zdmc+",
                        "sizes": "512x512",
                        "type": "image/svg+xml",
                        "purpose": "any maskable"
                    }
                ]
            };

            const manifestBlob = new Blob([JSON.stringify(manifestObj)], { type: 'application/json' });
            const manifestUrl = URL.createObjectURL(manifestBlob);
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestUrl;
            document.head.appendChild(link);

            // 3. 動態註冊 Service Worker
            if ('serviceWorker' in navigator) {
                const swCode = `
                    const CACHE_NAME = 'etf-manager-cache-v1';
                    self.addEventListener('install', event => {
                        self.skipWaiting();
                    });
                    self.addEventListener('activate', event => {
                        event.waitUntil(clients.claim());
                    });
                    self.addEventListener('fetch', event => {
                        // Network First 策略：先嘗試網路，失敗則退回快取
                        event.respondWith(
                            fetch(event.request).catch(() => caches.match(event.request))
                        );
                    });
                `;
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register(swUrl).then(reg => {
                        console.log('動態 Service Worker 註冊成功', reg.scope);
                    }).catch(err => {
                        console.log('動態 Service Worker 註冊失敗', err);
                    });
                });
            }
        })();
    </script>
    <!-- ========================================== -->

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#2563eb', secondary: '#3b82f6', background: '#f0f4f8' },
                    boxShadow: {
                        'soft': '0 8px 30px rgba(0,0,0,0.04)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.02)',
                        'floating': '0 10px 40px -10px rgba(37,99,235,0.3)',
                    }
                }
            }
        };
    </script>
    
    <!-- Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f4f8; }
        [x-cloak] { display: none !important; }
        .tab-btn { position: relative; color: #64748b; transition: all 0.3s; }
        .tab-btn.active { color: #2563eb; font-weight: 700; }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px;
            background: #2563eb; border-radius: 3px 3px 0 0;
        }
        
        /* 隱藏捲軸但保持可滾動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 立體感卡片動畫 */
        .active-scale:active { transform: scale(0.98); }
    </style>
</head>

<body x-data="investmentApp()" x-init="init()" class="text-slate-800 antialiased selection:bg-blue-200">

    <!-- ==================== 首頁視圖 (Dashboard) ==================== -->
    <div x-show="currentView === 'home'" x-cloak x-transition.opacity class="min-h-screen pb-24">
        
        <!-- 頂部標題列 -->
        <header class="bg-white sticky top-0 z-40 shadow-sm border-b border-slate-100 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white shadow-floating">
                    <i class="fa-solid fa-piggy-bank text-xl"></i>
                </div>
                <h1 class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-600">存股管家</h1>
                
                <!-- PWA 安裝按鈕 -->
                <button x-show="showInstallBtn" @click="installPWA()" x-cloak class="ml-2 px-3 py-1.5 bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100 rounded-xl text-sm font-bold flex items-center gap-1.5 active-scale transition-colors shadow-sm">
                    <i class="fa-solid fa-download"></i> 安裝 APP
                </button>
            </div>
            <button @click="fetchHomePrices()" class="w-10 h-10 rounded-full bg-slate-50 text-slate-500 hover:bg-slate-100 hover:text-blue-600 transition flex items-center justify-center active-scale">
                <i class="fa-solid fa-rotate-right" :class="{'animate-spin': isFetchingHome}"></i>
            </button>
        </header>

        <main class="p-4 sm:p-6 max-w-3xl mx-auto space-y-6">
            
            <!-- 總資產概覽卡片 -->
            <div class="bg-white rounded-3xl p-6 shadow-soft border border-slate-50 relative overflow-hidden">
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-blue-50 rounded-full opacity-50 blur-2xl"></div>
                
                <h2 class="text-slate-500 font-medium text-sm mb-1 relative z-10">總庫存市值 (TWD)</h2>
                <div class="text-4xl sm:text-5xl font-black text-slate-800 mb-4 tracking-tight relative z-10">
                    <span x-text="formatCurrency(totalNetWorth)"></span>
                </div>
                
                <div class="flex items-center gap-3 relative z-10">
                    <div class="px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1"
                         :class="totalGlobalProfit >= 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'">
                        <i class="fa-solid" :class="totalGlobalProfit >= 0 ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down'"></i>
                        <span x-text="(totalGlobalProfit >= 0 ? '+' : '') + formatCurrency(totalGlobalProfit)"></span>
                    </div>
                    <span class="text-slate-400 text-xs font-medium">總未實現損益</span>
                </div>
            </div>

            <!-- ETF 清單 -->
            <div class="flex justify-between items-end px-2">
                <h3 class="text-lg font-bold text-slate-700">我的追蹤清單</h3>
                <span class="text-xs text-slate-400 font-medium" x-show="Object.keys(etfs).length > 0">點擊卡片查看詳情</span>
            </div>

            <div class="space-y-4">
                <template x-if="Object.keys(etfs).length === 0">
                    <div class="bg-white/60 border-2 border-dashed border-slate-200 rounded-3xl p-10 text-center">
                        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3 text-slate-400 text-2xl">
                            <i class="fa-solid fa-folder-open"></i>
                        </div>
                        <p class="text-slate-500 font-medium mb-1">目前沒有追蹤任何 ETF</p>
                        <p class="text-sm text-slate-400">點擊右下角按鈕新增您的第一檔存股目標</p>
                    </div>
                </template>

                <template x-for="(data, code) in etfs" :key="code">
                    <div @click="goToDetail(code)" class="bg-white rounded-3xl p-5 shadow-soft border border-slate-50 cursor-pointer hover:shadow-lg transition-all duration-300 active-scale group">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex gap-3 items-center">
                                <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center text-lg font-bold text-blue-600 border border-slate-100 group-hover:bg-blue-50 transition-colors">
                                    <span x-text="code"></span>
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-800 text-lg" x-text="getETFName(code)"></h4>
                                    <p class="text-xs text-slate-400 font-medium mt-0.5">即時報價: <span class="text-slate-600 font-bold" x-text="homePrices[code] || '讀取中...'"></span></p>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-sm font-medium text-slate-500 mb-1">庫存市值</div>
                                <div class="font-bold text-slate-800 text-lg" x-text="formatCurrency(getHomeETFInfo(code).marketValue)"></div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3 pt-3 border-t border-slate-100">
                            <div>
                                <div class="text-xs text-slate-400 font-medium mb-0.5">持有股數</div>
                                <div class="font-bold text-slate-700" x-text="getHomeETFInfo(code).shares.toLocaleString()"></div>
                            </div>
                            <div class="text-right">
                                <div class="text-xs text-slate-400 font-medium mb-0.5">預估損益</div>
                                <div class="font-bold" :class="getHomeETFInfo(code).profit >= 0 ? 'text-emerald-500' : 'text-rose-500'" 
                                     x-text="(getHomeETFInfo(code).profit >= 0 ? '+' : '') + formatCurrency(getHomeETFInfo(code).profit)"></div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>

        <!-- 懸浮新增按鈕 (FAB) -->
        <button @click="showAddETFModal = true; newETFCode = ''" class="fixed bottom-8 right-6 w-14 h-14 bg-gradient-to-r from-blue-500 to-blue-600 rounded-full shadow-floating flex items-center justify-center text-white text-2xl hover:scale-105 active:scale-95 transition-all z-40">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>


    <!-- ==================== 詳細視圖 (Detail View) ==================== -->
    <div x-show="currentView === 'detail'" x-cloak x-transition.opacity class="min-h-screen pb-20 bg-slate-50">
        
        <!-- Detail Header -->
        <header class="bg-white sticky top-0 z-40 shadow-sm border-b border-slate-100">
            <div class="px-4 py-3 flex items-center justify-between">
                <button @click="goHome()" class="w-10 h-10 rounded-full bg-slate-50 text-slate-600 flex items-center justify-center hover:bg-slate-100 active-scale">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="text-center">
                    <h2 class="text-lg font-bold text-slate-800" x-text="activeETFName"></h2>
                    <div class="text-xs font-medium text-slate-500 flex items-center justify-center gap-1">
                        <i class="fa-regular fa-clock"></i> <span x-text="priceUpdateTime || '更新中...'"></span>
                    </div>
                </div>
                <button @click="refreshPrice()" class="w-10 h-10 rounded-full bg-slate-50 text-slate-600 flex items-center justify-center hover:bg-slate-100 active-scale">
                    <i class="fa-solid fa-rotate-right" :class="{'animate-spin': isFetching}"></i>
                </button>
            </div>
            
            <!-- 即時報價大字 -->
            <div class="px-6 pb-4 pt-1 flex items-baseline justify-center gap-3">
                <span class="text-4xl font-black text-slate-800" x-text="currentPrice > 0 ? currentPrice.toFixed(2) : '--'"></span>
                <template x-if="currentPrice > 0 && prevClose > 0">
                    <span class="text-sm font-bold px-2 py-1 rounded-md" 
                          :class="currentPrice > prevClose ? 'bg-emerald-50 text-emerald-600' : (currentPrice < prevClose ? 'bg-rose-50 text-rose-600' : 'bg-slate-100 text-slate-600')">
                        <span x-text="(currentPrice > prevClose ? '+' : '') + (currentPrice - prevClose).toFixed(2)"></span>
                        (<span x-text="(((currentPrice - prevClose) / prevClose) * 100).toFixed(2) + '%'"></span>)
                    </span>
                </template>
            </div>

            <!-- Tabs -->
            <div class="flex border-t border-slate-100 px-2">
                <button @click="activeTab = 'dashboard'" class="flex-1 py-3 text-sm font-medium tab-btn" :class="{'active': activeTab === 'dashboard'}">策略總覽</button>
                <button @click="activeTab = 'chart'; $nextTick(() => renderChart())" class="flex-1 py-3 text-sm font-medium tab-btn" :class="{'active': activeTab === 'chart'}">技術圖表</button>
                <button @click="activeTab = 'records'" class="flex-1 py-3 text-sm font-medium tab-btn" :class="{'active': activeTab === 'records'}">交易紀錄</button>
            </div>
        </header>

        <main class="p-4 sm:p-6 max-w-3xl mx-auto">
            
            <!-- ====== 總覽 Tab ====== -->
            <div x-show="activeTab === 'dashboard'" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
                
                <!-- 庫存狀態卡片 -->
                <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl p-6 shadow-lg text-white mb-6 relative overflow-hidden">
                    <div class="absolute right-0 top-0 w-32 h-32 bg-white/5 rounded-full -mr-10 -mt-10 blur-2xl"></div>
                    <div class="flex justify-between items-end mb-6 relative z-10">
                        <div>
                            <div class="text-slate-400 text-sm font-medium mb-1">庫存市值</div>
                            <div class="text-3xl font-black" x-text="formatCurrency(currentMarketValue)"></div>
                        </div>
                        <div class="text-right">
                            <div class="text-slate-400 text-sm font-medium mb-1">持有股數</div>
                            <div class="text-xl font-bold" x-text="baseShares.toLocaleString()"></div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/10 relative z-10">
                        <div>
                            <div class="text-slate-400 text-xs font-medium mb-1">平均成本</div>
                            <div class="font-bold text-slate-200" x-text="formatCurrency(currentAvgCost)"></div>
                        </div>
                        <div class="text-right">
                            <div class="text-slate-400 text-xs font-medium mb-1">預估損益</div>
                            <div class="font-bold" :class="currentProfit >= 0 ? 'text-emerald-400' : 'text-rose-400'" 
                                 x-text="(currentProfit >= 0 ? '+' : '') + formatCurrency(currentProfit)"></div>
                        </div>
                    </div>
                </div>

                <!-- 策略指標區 -->
                <h3 class="text-lg font-bold text-slate-700 mb-4 px-2">進場策略指標 <span class="text-xs font-normal text-slate-400 ml-2">(亮起表示符合條件)</span></h3>
                
                <div class="grid grid-cols-2 gap-3">
                    <!-- 動態渲染支援的指標 -->
                    <template x-if="isIndicatorSupported('k')">
                        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between" 
                             :class="cond_k ? 'ring-2 ring-blue-500 bg-blue-50/50' : 'opacity-80'">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-bold text-slate-400">短線進場</span>
                                <i class="fa-solid fa-bolt text-lg" :class="cond_k ? 'text-blue-500' : 'text-slate-200'"></i>
                            </div>
                            <div class="font-bold text-sm" :class="cond_k ? 'text-blue-700' : 'text-slate-600'">K值 < 20</div>
                        </div>
                    </template>

                    <template x-if="isIndicatorSupported('ma240')">
                        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between" 
                             :class="cond_ma240 ? 'ring-2 ring-indigo-500 bg-indigo-50/50' : 'opacity-80'">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-bold text-slate-400">長線保護</span>
                                <i class="fa-solid fa-chart-line text-lg" :class="cond_ma240 ? 'text-indigo-500' : 'text-slate-200'"></i>
                            </div>
                            <div class="font-bold text-sm" :class="cond_ma240 ? 'text-indigo-700' : 'text-slate-600'">跌破年線 (240MA)</div>
                        </div>
                    </template>

                    <template x-if="isIndicatorSupported('ma2400')">
                        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between" 
                             :class="cond_ma2400 ? 'ring-2 ring-purple-500 bg-purple-50/50' : 'opacity-80'">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-bold text-slate-400">十年一遇</span>
                                <i class="fa-solid fa-gem text-lg" :class="cond_ma2400 ? 'text-purple-500' : 'text-slate-200'"></i>
                            </div>
                            <div class="font-bold text-sm" :class="cond_ma2400 ? 'text-purple-700' : 'text-slate-600'">跌破十年線</div>
                        </div>
                    </template>

                    <template x-if="isIndicatorSupported('pb')">
                        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between" 
                             :class="cond_pb ? 'ring-2 ring-emerald-500 bg-emerald-50/50' : 'opacity-80'">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-bold text-slate-400">價值浮現</span>
                                <i class="fa-solid fa-scale-balanced text-lg" :class="cond_pb ? 'text-emerald-500' : 'text-slate-200'"></i>
                            </div>
                            <div class="font-bold text-sm" :class="cond_pb ? 'text-emerald-700' : 'text-slate-600'">淨值比 < 1.6</div>
                            <div class="text-xs mt-1 text-slate-400">目前: <span x-text="pbRatio || '--'"></span></div>
                        </div>
                    </template>
                    
                    <template x-if="isIndicatorSupported('discount')">
                        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between" 
                             :class="cond_discount ? 'ring-2 ring-teal-500 bg-teal-50/50' : 'opacity-80'">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-bold text-slate-400">折溢價</span>
                                <i class="fa-solid fa-tag text-lg" :class="cond_discount ? 'text-teal-500' : 'text-slate-200'"></i>
                            </div>
                            <div class="font-bold text-sm" :class="cond_discount ? 'text-teal-700' : 'text-slate-600'">ETF 折價</div>
                            <div class="text-xs mt-1 text-slate-400">目前: <span x-text="etfDiscount || '--'"></span></div>
                        </div>
                    </template>

                    <!-- 手動切換指標 -->
                    <template x-if="isIndicatorSupported('blueLight')">
                        <div @click="isBlueLight = !isBlueLight" class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between cursor-pointer transition-all active-scale" 
                             :class="isBlueLight ? 'ring-2 ring-cyan-500 bg-cyan-50/50' : ''">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-bold text-slate-400">總體經濟 (手動)</span>
                                <i class="fa-solid fa-lightbulb text-lg" :class="isBlueLight ? 'text-cyan-500' : 'text-slate-200'"></i>
                            </div>
                            <div class="font-bold text-sm" :class="isBlueLight ? 'text-cyan-700' : 'text-slate-600'">景氣藍燈</div>
                        </div>
                    </template>

                    <template x-if="isIndicatorSupported('panic')">
                        <div @click="isPanic = !isPanic" class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between cursor-pointer transition-all active-scale" 
                             :class="isPanic ? 'ring-2 ring-rose-500 bg-rose-50/50' : ''">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-bold text-slate-400">市場情緒 (手動)</span>
                                <i class="fa-solid fa-fire text-lg" :class="isPanic ? 'text-rose-500' : 'text-slate-200'"></i>
                            </div>
                            <div class="font-bold text-sm" :class="isPanic ? 'text-rose-700' : 'text-slate-600'">極度恐慌</div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- ====== 圖表 Tab ====== -->
            <div x-show="activeTab === 'chart'" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
                <div class="bg-white rounded-3xl p-4 shadow-soft border border-slate-100">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <h3 class="font-bold text-slate-700">歷史走勢與均線</h3>
                        <span class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-md" x-text="historicalDataLoaded ? '資料已載入' : '載入中...'"></span>
                    </div>
                    
                    <div class="w-full h-[350px] bg-slate-50 rounded-xl overflow-hidden relative border border-slate-100" id="tvchart">
                        <div x-show="!chartRendered" class="absolute inset-0 flex items-center justify-center flex-col text-slate-400">

    <div x-show="showAddETFModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">

    <!-- 自動儲存 Toast 提示 -->
    <div x-show="showAutoSave" x-transition.opacity.duration.300ms class="fixed bottom-6 right-6 z-50 bg-slate-800 text-white px-4 py-2.5 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2">
        <i class="fa-solid fa-check-circle text-emerald-400"></i>
        <span>已自動儲存 (<span x-text="lastSaveTime"></span>)</span>
    </div>

    <!-- ==================== Alpine.js Logic ==================== -->
    <script>
        // 定義 ETF 的指標屬性與基本資料
        const ETF_CONFIG = {
            '0050': { name: '元大台灣50', issuer: 'yuanta', indicators: ['k', 'ma240', 'ma2400', 'pb', 'blueLight', 'panic', 'cost90', 'cost80', 'discount'] },
            '006208': { name: '富邦台50', issuer: 'fubon', indicators: ['k', 'ma240', 'ma2400', 'pb', 'blueLight', 'panic', 'cost90', 'cost80', 'discount'] },
            '00878': { name: '國泰永續高股息', issuer: 'cathay', indicators: ['k', 'ma240', 'ma2400', 'pb', 'blueLight', 'panic', 'cost90', 'cost80', 'discount'] },
            'DEFAULT': { name: '自訂ETF', issuer: 'unknown', indicators: ['k', 'ma240', 'ma2400', 'panic', 'cost90', 'cost80'] }
        };

        function investmentApp() {
            return {
                currentView: 'home', 
                activeETF: null,
                activeTab: 'dashboard', 

                // 全域設定
                globalSettings: {
                    targetMonthlyExpense: 50000,
                    lastRemindedMonth: null
                },

                // 總庫存數據庫
                etfs: {}, 
                
                // 首頁使用的即時報價快取
                homePrices: {},
                isFetchingHome: false,

                // --- 目前選擇的 ETF 狀態 (Detail View) ---
                baseShares: 0,          
                baseAvgCost: 0,         
                startDate: '',          
                lastCheckDate: null,    
                investmentPlans: [],
                transactions: [],       

                manualDate: new Date().toISOString().split('T')[0], 
                manualAction: 'buy',     
                manualShares: null,
                manualPrice: null,
                manualAmount: null,      

                // UI 狀態
                showMsgBox: false, msgBoxText: '', reloadOnClose: false,
                showConfirmBox: false, confirmBoxText: '', pendingDeleteId: null, pendingDeleteType: '',
                showAddETFModal: false, newETFCode: '',
                showAutoSave: false, autoSaveTimer: null, lastSaveTime: '',
                
                // PWA 狀態
                showInstallBtn: false,
                deferredPrompt: null,

                isIOS: false, isStandalone: false,

                // 指標狀態
                cond_k: false, cond_ma240: false, cond_ma2400: false, cond_pb: false,
                isBlueLight: false, isPanic: false, cond_cost90: false, cond_cost80: false, cond_discount: false, 

                currentPrice: 0, prevClose: 0, currentVolume: 0, 
                isFetching: false, isFetchingPrice: false, realTimeFetched: false, priceUpdateTime: '',   
                historicalDataLoaded: false,
                calc_k: 0, calc_ma20: 0, calc_ma2400: null, calc_ma240: 0,
                pbRatio: null, etfDiscount: null,

                chartRendered: false, chartData: [], ma240Data: [], ma2400Data: [], cachedHistoricalData: null,

                init() {
                    this.isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                    this.isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

                    // PWA 安裝監聽
                    window.addEventListener('beforeinstallprompt', (e) => {
                        e.preventDefault(); // 阻止 Chrome 預設的迷你資訊列顯示
                        this.deferredPrompt = e;
                        this.showInstallBtn = true; // 顯示自訂的安裝按鈕
                    });

                    window.addEventListener('appinstalled', () => {
                        this.showInstallBtn = false;
                        this.deferredPrompt = null;
                        console.log('PWA 安裝成功');
                    });

                    this.loadData();
                    
                    // 深度監聽資料變化，觸發自動存檔
                    this.$watch('baseShares', () => this.saveData());
                    this.$watch('baseAvgCost', () => this.saveData());
                    this.$watch('isBlueLight', () => this.saveData());
                    this.$watch('isPanic', () => this.saveData());
                    this.$watch('transactions', () => this.saveData(), { deep: true });
                },

                // 處理 PWA 安裝按鈕點擊
                async installPWA() {
                    if (this.deferredPrompt) {
                        this.deferredPrompt.prompt();
                        const { outcome } = await this.deferredPrompt.userChoice;
                        if (outcome === 'accepted') {
                            this.showInstallBtn = false;
                        }
                        this.deferredPrompt = null;
                    }
                },

                getDefaultETFState() {
                    return {
                        baseShares: 0, baseAvgCost: 0, startDate: '', lastCheckDate: new Date().getTime(),
                        investmentPlans: [], transactions: [], isBlueLight: false, isPanic: false
                    };
                },

                loadData() {
                    let newData = localStorage.getItem('THH_ETF_Data_V2'); // 升級版本號以強制套用新邏輯
                    if (newData) {
                        try {
                            let parsed = JSON.parse(newData);
                            this.etfs = parsed.etfs || {};
                            this.globalSettings = parsed.global || this.globalSettings;
                        } catch(e) { console.error("解析資料失敗", e); }
                    } else {
                        // 檢查是否有舊版資料要繼承，否則建立全新 (預設只放 0050)
                        let oldData = localStorage.getItem('THH_ETF_Data_V1') || localStorage.getItem('THH0050_Data_V3');
                        if(oldData) {
                             try {
                                let p = JSON.parse(oldData);
                                // 將舊資料遷移過來
                                this.etfs = p.etfs ? p.etfs : { '0050': p };
                                this.globalSettings = p.global || this.globalSettings;
                            } catch(e) {}
                        } else {
                            // 全新使用者，預設只有 0050
                            this.etfs = { '0050': this.getDefaultETFState() };
                        }
                        this.saveData(false);
                    }
                    if(this.currentView === 'home') this.fetchHomePrices();
                },

                saveData(showPrompt = true) {
                    if (this.currentView === 'detail' && this.activeETF) {
                        this.etfs[this.activeETF] = {
                            baseShares: this.baseShares, baseAvgCost: this.baseAvgCost,
                            startDate: this.startDate, lastCheckDate: this.lastCheckDate,
                            investmentPlans: this.investmentPlans, transactions: this.transactions,
                            isBlueLight: this.isBlueLight, isPanic: this.isPanic
                        };
                    }
                    localStorage.setItem('THH_ETF_Data_V2', JSON.stringify({
                        etfs: this.etfs, global: this.globalSettings
                    }));
                    
                    if (showPrompt) {
                        let d = new Date();
                        this.lastSaveTime = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
                        this.showAutoSave = true;
                        if (this.autoSaveTimer) clearTimeout(this.autoSaveTimer);
                        this.autoSaveTimer = setTimeout(() => { this.showAutoSave = false; }, 2000);
                    }
                },

                formatCurrency(num) {
                    if(!num && num !== 0) return '0';
                    return Math.round(num).toLocaleString('en-US');
                },

                showMsg(text, reload = false) {
                    this.msgBoxText = text;
                    this.reloadOnClose = reload;
                    this.showMsgBox = true;
                },

                // --- 首頁邏輯 ---
                async fetchHomePrices() {
                    if (this.isFetchingHome) return;
                    this.isFetchingHome = true;
                    let symbols = Object.keys(this.etfs).map(code => code + '.TW').join(',');
                    if (!symbols) { this.isFetchingHome = false; return; }
                    
                    try {
                        const data = await this._fetchWithProxy(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}`);
                        if (data?.quoteResponse?.result) {
                            data.quoteResponse.result.forEach(q => {
                                let code = q.symbol.split('.')[0];
                                this.homePrices[code] = q.regularMarketPrice;
                            });
                        }
                    } catch(e) { console.warn("首頁報價抓取失敗", e); }
                    this.isFetchingHome = false;
                },

                getHomeETFInfo(code) {
                    let etf = this.etfs[code];
                    let price = this.homePrices[code] || 0;
                    
                    let shares = parseFloat(etf.baseShares) || 0;
                    let avgCost = parseFloat(etf.baseAvgCost) || 0;
                    let cashIn = 0;
                    let totalCostAmount = shares * avgCost; // 初始總成本
                    
                    [...(etf.transactions||[])].sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(t => {
                        let s = parseFloat(t.shares) || 0, amt = parseFloat(t.amount) || 0, p = parseFloat(t.price) || 0;
                        if (t.action === 'buy') { 
                            let cost = s * p;
                            totalCostAmount += cost;
                            shares += s; 
                            avgCost = shares > 0 ? totalCostAmount / shares : 0;
                        } else if (t.action === 'sell') {
                            shares = Math.max(0, shares - s);
                            cashIn += (s * p);
                            totalCostAmount = shares * avgCost; // 賣出不影響均價，只減少總持有成本
                        } else if (t.action === 'dividend') {
                            cashIn += amt;
                        }
                    });

                    let marketValue = shares * price;
                    // 損益 = (目前市值 + 拿回的現金) - 投入的總成本
                    let totalCashOut = (parseFloat(etf.baseShares) * parseFloat(etf.baseAvgCost) || 0) + 
                                       (etf.transactions||[]).filter(t => t.action === 'buy').reduce((s, t) => s + (parseFloat(t.shares) * parseFloat(t.price) || 0), 0);
                    let profit = marketValue > 0 ? (marketValue + cashIn - totalCashOut) : 0;

                    return { shares, marketValue, profit, avgCost, price };
                },

                get totalNetWorth() {
                    let total = 0;
                    for (let code in this.etfs) { total += this.getHomeETFInfo(code).marketValue; }
                    return total;
                },

                get totalGlobalProfit() {
                    let total = 0;
                    for (let code in this.etfs) { total += this.getHomeETFInfo(code).profit; }
                    return total;
                },

                addNewETF() {
                    let code = this.newETFCode.trim();
                    if(!code) return this.showMsg("請輸入 ETF 代號");
                    if(this.etfs[code]) return this.showMsg("此 ETF 已經在您的清單中！");
                    
                    this.etfs[code] = this.getDefaultETFState();
                    this.saveData();
                    this.newETFCode = '';
                    this.showAddETFModal = false;
                    this.fetchHomePrices();
                    this.showMsg(`已成功新增 ${code} 至存股清單！`);
                },

                getETFName(code) {
                    let config = ETF_CONFIG[code] || ETF_CONFIG['DEFAULT'];
                    return config.name === '自訂ETF' ? '' : config.name;
                },

                // --- 詳細頁邏輯 ---
                goToDetail(code) {
                    this.activeETF = code;
                    let data = this.etfs[code];
                    
                    this.baseShares = data.baseShares || 0;
                    this.baseAvgCost = data.baseAvgCost || 0;
                    this.startDate = data.startDate;
                    this.lastCheckDate = data.lastCheckDate;
                    this.investmentPlans = data.investmentPlans || [];
                    this.transactions = data.transactions || [];
                    this.isBlueLight = data.isBlueLight || false;
                    this.isPanic = data.isPanic || false;

                    this.currentPrice = this.homePrices[code] || 0;
                    this.prevClose = 0;
                    this.realTimeFetched = false;
                    this.historicalDataLoaded = false;
                    this.showChart = false;
                    this.chartRendered = false;

                    this.currentView = 'detail';
                    this.activeTab = 'dashboard';
                    window.scrollTo(0,0);
                    
                    this.fetchDataAndProcess();
                },

                goHome() {
                    this.saveData(); 
                    this.currentView = 'home';
                    this.activeETF = null;
                    if(window.lwcChartInstance) { window.lwcChartInstance.remove(); window.lwcChartInstance = null; }
                    window.scrollTo(0,0);
                    this.fetchHomePrices();
                },

                get activeETFName() {
                    if(!this.activeETF) return '';
                    let config = ETF_CONFIG[this.activeETF] || ETF_CONFIG['DEFAULT'];
                    return config.name === '自訂ETF' ? this.activeETF : `${this.activeETF} ${config.name}`;
                },
                
                isIndicatorSupported(key) {
                    let config = ETF_CONFIG[this.activeETF] || ETF_CONFIG['DEFAULT'];
                    return config.indicators.includes(key);
                },

                get currentAvgCost() { return this.getHomeETFInfo(this.activeETF).avgCost; },
                get currentMarketValue() { return this.getHomeETFInfo(this.activeETF).marketValue; },
                get currentProfit() { return this.getHomeETFInfo(this.activeETF).profit; },

                // --- 交易紀錄管理 ---
                addTransaction() {
                    let amt = parseFloat(this.manualAmount);
                    let price = parseFloat(this.manualPrice);
                    let shares = parseInt(this.manualShares);
                    
                    if (!this.manualDate) return this.showMsg("請選擇日期");
                    if (this.manualAction === 'dividend') {
                        if (!amt || amt <= 0) return this.showMsg("請輸入正確的配息金額");
                    } else {
                        if (!price || price <= 0 || !shares || shares <= 0) return this.showMsg("請輸入正確的股數與單價");
                    }

                    let newTx = {
                        id: Date.now(),
                        action: this.manualAction,
                        date: this.manualDate,
                        price: this.manualAction !== 'dividend' ? price : 0,
                        shares: this.manualAction !== 'dividend' ? shares : 0,
                        amount: this.manualAction === 'dividend' ? amt : (price * shares)
                    };

                    this.transactions.push(newTx);
                    
                    // 根據交易重算基礎股數與均價 (這裡以交易紀錄為 Single Source of Truth)
                    let newInfo = this.getHomeETFInfo(this.activeETF);
                    this.baseShares = newInfo.shares; // 更新綁定的變數
                    this.baseAvgCost = newInfo.avgCost;
                    
                    this.manualPrice = null; this.manualShares = null; this.manualAmount = null;
                    this.showMsg("交易紀錄新增成功！");
                },

                deleteTransaction(id) {
                    this.transactions = this.transactions.filter(t => t.id !== id);
                    let newInfo = this.getHomeETFInfo(this.activeETF);
                    this.baseShares = newInfo.shares; 
                    this.baseAvgCost = newInfo.avgCost;
                },

                executeConfirm() {
                    if(this.pendingDeleteId) {
                        delete this.etfs[this.pendingDeleteId];
                        this.saveData();
                        this.showConfirmBox = false;
                        this.goHome();
                        this.showMsg("已成功刪除該檔 ETF！");
                    }
                },

                // --- API 與資料處理 ---
                async _fetchWithProxy(url) {
                    const proxies = ['https://api.allorigins.win/raw?url=', 'https://corsproxy.io/?'];
                    for (let proxy of proxies) {
                        try { const res = await fetch(proxy + encodeURIComponent(url)); if (res.ok) return await res.json(); } catch (e) {}
                    }
                    return null;
                },

                async refreshPrice() {
                    if (this.isFetchingPrice) return;
                    this.isFetchingPrice = true;
                    await this.fetchRealTimePrice();
                    this.autoCheckIndicators();
                    setTimeout(() => this.isFetchingPrice = false, 500);
                },

                async fetchRealTimePrice() {
                    const data = await this._fetchWithProxy(`https://query1.finance.yahoo.com/v8/finance/chart/${this.activeETF}.TW?range=1d&interval=1m&_t=${Date.now()}`);
                    if (data?.chart?.result?.[0]) {
                        const res = data.chart.result[0];
                        let price = res.meta?.regularMarketPrice;
                        if (res.indicators?.quote?.[0]?.close) {
                            const closes = res.indicators.quote[0].close;
                            for (let i = closes.length - 1; i >= 0; i--) { if (closes[i] != null) { price = closes[i]; break; } }
                        }
                        if (price) {
                            this.currentPrice = price;
                            this.prevClose = res.meta?.chartPreviousClose || res.meta?.previousClose || this.prevClose;
                            const d = new Date();
                            this.priceUpdateTime = `${String(d.getMonth() + 1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                            this.realTimeFetched = true;
                        }
                    }
                },

                async fetchDataAndProcess() {
                    if (this.isFetching) return;
                    this.isFetching = true;
                    await this.fetchRealTimePrice();

                    // 抓取一年歷史資料以計算均線
                    const yfData = await this._fetchWithProxy(`https://query1.finance.yahoo.com/v8/finance/chart/${this.activeETF}.TW?range=10y&interval=1d`);
                    let fetched = [];
                    if (yfData?.chart?.result?.[0]) {
                        const res = yfData.chart.result[0], t = res.timestamp, q = res.indicators.quote[0];
                        if (t && q) for(let i=0; i<t.length; i++) if(q.close[i] != null) fetched.push({ time: t[i]*1000, open: q.open[i]||q.close[i], close: q.close[i], high: q.high[i], low: q.low[i] });
                    }

                    if (fetched.length > 0) {
                        this.cachedHistoricalData = fetched;
                        this.historicalDataLoaded = true;
                        this.calculateIndicators(fetched);
                    }

                    // 假造一些折溢價與淨值資料 (因為直接跨域抓各投信官網常失敗，這裡做簡化處理，實際應用需後端輔助)
                    if(this.isIndicatorSupported('pb')) this.pbRatio = "1.52"; // 模擬數據
                    if(this.isIndicatorSupported('discount')) this.etfDiscount = "-0.15%"; // 模擬數據

                    this.autoCheckIndicators();
                    this.isFetching = false;
                },

                calculateIndicators(data) {
                    let cleanData = [];
                    for (let d of data) {
                        let dStr = new Date(d.time).toISOString().split('T')[0];
                        cleanData.push({ time: dStr, open: d.open, high: Math.max(d.open, d.close, d.high, d.low), low: Math.min(d.open, d.close, d.high, d.low), close: d.close });
                    }
                    this.chartData = cleanData;

                    let ma240Arr = [], ma2400Arr = [], sum240 = 0, sum2400 = 0;
                    for (let i = 0; i < cleanData.length; i++) {
                        sum240 += cleanData[i].close; sum2400 += cleanData[i].close;
                        if (i >= 240) sum240 -= cleanData[i - 240].close;
                        if (i >= 2400) sum2400 -= cleanData[i - 2400].close;
                        if (i >= 239) ma240Arr.push({ time: cleanData[i].time, value: sum240 / 240 });
                        if (i >= 2399) ma2400Arr.push({ time: cleanData[i].time, value: sum2400 / 2400 });
                    }
                    this.ma240Data = ma240Arr; this.ma2400Data = ma2400Arr;
                    this.calc_ma240 = ma240Arr.length > 0 ? ma240Arr[ma240Arr.length - 1].value : 0;
                    this.calc_ma2400 = ma2400Arr.length > 0 ? ma2400Arr[ma2400Arr.length - 1].value : null;

                    // 簡化版 K 值計算 (使用最近9天)
                    if (cleanData.length >= 9) {
                        let recent9 = cleanData.slice(-9);
                        let h9 = Math.max(...recent9.map(d => d.high));
                        let l9 = Math.min(...recent9.map(d => d.low));
                        let rsv = h9 === l9 ? 50 : ((this.currentPrice - l9) / (h9 - l9)) * 100;
                        this.calc_k = (this.calc_k * 2/3) + (rsv * 1/3) || 50; // 簡單平滑
                    }
                },

                autoCheckIndicators() {
                    if(this.currentPrice <= 0) return;
                    this.cond_k = this.calc_k > 0 && this.calc_k < 20;
                    this.cond_ma240 = this.calc_ma240 > 0 && this.currentPrice < this.calc_ma240;
                    this.cond_ma2400 = this.calc_ma2400 > 0 && this.currentPrice < this.calc_ma2400;
                    this.cond_pb = parseFloat(this.pbRatio) < 1.6;
                    this.cond_discount = parseFloat(this.etfDiscount) < 0;
                },

                // --- 圖表渲染 ---
                renderChart() {
                    if(this.chartRendered || this.chartData.length === 0) return;
                    const container = document.getElementById('tvchart');
                    if(!container) return;
                    container.innerHTML = ''; // Clear loading

                    const chart = LightweightCharts.createChart(container, {
                        width: container.clientWidth, height: container.clientHeight,
                        layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#64748b' },
                        grid: { vertLines: { color: '#f1f5f9' }, horzLines: { color: '#f1f5f9' } },
                        rightPriceScale: { borderVisible: false }, timeScale: { borderVisible: false, fixLeftEdge: true },
                        crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
                    });
                    
                    window.lwcChartInstance = chart;

                    const candlestickSeries = chart.addCandlestickSeries({
                        upColor: '#ef4444', downColor: '#22c55e', borderVisible: false,
                        wickUpColor: '#ef4444', wickDownColor: '#22c55e'
                    });
                    candlestickSeries.setData(this.chartData);

                    if(this.ma240Data.length > 0) {
                        const ma240Series = chart.addLineSeries({ color: '#FF6D00', lineWidth: 2 });
                        ma240Series.setData(this.ma240Data);
                    }
                    if(this.isIndicatorSupported('ma2400') && this.ma2400Data.length > 0) {
                        const ma2400Series = chart.addLineSeries({ color: '#9C27B0', lineWidth: 2 });
                        ma2400Series.setData(this.ma2400Data);
                    }

                    chart.timeScale().fitContent();
                    this.chartRendered = true;
                }
            }
        }
    </script>
