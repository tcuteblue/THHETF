### 主要修正重點：
1. **防止撐破排版 (`truncate` 與 `min-w-0`)：** 為了防止太大的數字把 Grid 或 Flex 容器給撐破，我在數字的容器上加上了 `min-w-0` 與 `truncate`（字太長時會顯示「...」），確保版面寬度絕對不會超出視窗。
2. **響應式字級動態縮小 (`text-2xl sm:text-4xl`)：** 由於 `text-5xl` 在手機上確實太過巨大，我將這些巨大數字的預設值調小到 `text-2xl` ~ `text-3xl`（約 24~30px），確保包含千分位逗號的百萬級別數字能完美塞入兩欄式佈局中。
3. **明細編輯器垂直堆疊 (`flex-col sm:flex-row`)：** 歷史明細的「單價」與「股數」輸入框，在極小螢幕中若硬要並排會導致字體顯示不全。現在修改為在小螢幕時自動「上下推疊」，遇到大一點的手機或平板才會左右並排。
4. **根字體微調 (`font-size: 16px`)：** 在小於 639px 的設備上，整體字距基礎單位再微調縮小一點，騰出更多安全空間。
